		<style>
			/* Centre the SVG in the viewport */
			body {
				margin: 0;
				overflow: visible;
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100vh;
			}

			/* Scale SVG to fill the window with breathing room */
			svg {
				width: min(90vw, 90vh);
				height: min(90vw, 90vh);
				overflow: visible;
			}

			/* Define the ripple pulse — scales each ring out and back */
			@keyframes ripple {
				0% {
					transform: scale(1);
				} /* normal size */
				50% {
					transform: scale(1.1);
				} /* slightly grown */
				100% {
					transform: scale(1);
				} /* back to normal */
			}

			/* Apply the animation to all rings */
			.ring {
				transform-origin: center; /* scale from the centre outward */
				animation: ripple 6s ease-in-out infinite; /* loop forever */
			}

			/* Stagger each ring's animation so the ripple travels outward from centre.
   The innermost ring (ring-18) starts first, each outer ring fires slightly later. */
			.ring-1 {
				animation-delay: 0s;
			}
			.ring-2 {
				animation-delay: 0.3s;
			}
			.ring-3 {
				animation-delay: 0.6s;
			}
			.ring-4 {
				animation-delay: 0.9s;
			}
			.ring-5 {
				animation-delay: 1.2s;
			}
			.ring-6 {
				animation-delay: 1.5s;
			}
			.ring-7 {
				animation-delay: 1.8s;
			}
			.ring-8 {
				animation-delay: 2.1s;
			}
			.ring-9 {
				animation-delay: 2.4s;
			}
			.ring-10 {
				animation-delay: 2.7s;
			}
			.ring-11 {
				animation-delay: 3s;
			}
			.ring-12 {
				animation-delay: 3.3s;
			}
			.ring-13 {
				animation-delay: 3.6s;
			}
			.ring-14 {
				animation-delay: 3.9s;
			}
			.ring-15 {
				animation-delay: 4.2s;

			.ring-16 {

			.ring-17 {

			}

			}
