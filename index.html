<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>D3 Playground</title>
    <link rel="stylesheet" href="resources/public/css/style.css" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <!-- Fill the screen so there are no scroll bars-->
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      text {
        font-size: 25px;
        font-family: "Nunito Sans", sans-serif;
      }
    </style>
  </head>

  <body>
    <svg width="960" height="500">
      <!-- Add a clothesline -->
      <path
        d="M 0,100 Q 480,200 960,100"
        stroke="#333"
        stroke-width="2.5"
        fill="none"
      ></path>

      <!-- First towel (center) -->
      <polygon fill="#c6d3d6">
        <animate
          attributeName="points"
          values="405,147 555,147 570,362 390,362;
                  405,147 555,147 555,347 405,347;
                  405,147 555,147 540,332 420,332;
                  405,147 555,147 555,347 405,347;
                  405,147 555,147 570,362 390,362"
          dur="3s"
          repeatCount="indefinite"
        />
      </polygon>

      <!-- First towel (center) -->
      <!-- <rect x="405" y="147" width="150" height="200" fill="#c6d3d6"></rect> -->

      <!-- Second towel (left of center) -->
      <rect
        x="225"
        y="140"
        width="150"
        height="200"
        fill="#e9d3b3"
        transform="rotate(5, 300, 230)"
      ></rect>

      <!-- Third towel (right of center) -->
      <rect
        x="585"
        y="139.5"
        width="150"
        height="200"
        fill="#b7c2a3"
        transform="rotate(-4.2, 660, 230)"
      ></rect>

      <!-- Fourth towel (far left) -->
      <rect
        x="45"
        y="119.5"
        width="150"
        height="200"
        fill="#a47347"
        transform="rotate(8.5, 120, 220)"
      ></rect>

      <!-- Fifth towel (far right) -->
      <rect
        x="765"
        y="119.5"
        width="150"
        height="200"
        fill="#d3a23e"
        transform="rotate(-8.5, 840, 220)"
      ></rect>
    </svg>

    <main></main>
    <script src="resources/public/js/main.js"></script>

    <!-- Create a div where the graph will be inserted -->
    <div id="my_viz"></div>

    <!-- Pseudo bar Chart -->

    <svg
      width="618"
      height="481"
      viewBox="0 0 618 481"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <rect width="618" height="481" fill="white" />
      <rect
        x="401"
        y="59"
        width="56"
        height="345"
        transform="rotate(90 401 59)"
        fill="red"
      />
      <rect
        x="235"
        y="375"
        width="56"
        height="179"
        transform="rotate(90 235 375)"
        fill="black"
      />
      <rect
        x="273"
        y="296"
        width="56"
        height="217"
        transform="rotate(90 273 296)"
        fill="black"
      />
      <rect
        x="315"
        y="217"
        width="56"
        height="259"
        transform="rotate(90 315 217)"
        fill="black"
      />
      <rect
        x="360"
        y="138"
        width="56"
        height="304"
        transform="rotate(90 360 138)"
        fill="black"
      />

      <text fill="black" x="411" y="89">First</text>
    </svg>
  </body>
</html>
